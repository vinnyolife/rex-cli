<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debug Log Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Geist Mono"', 'monospace'],
            sans: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            surface: {
              0: '#0d1117',
              1: '#161b22',
              2: '#1c2129',
              3: '#272d36',
              4: '#333b45',
            },
            border: {
              DEFAULT: '#30363d',
              bright: '#484f58',
            },
            accent: '#00d4aa',
            warn: '#ffb224',
            danger: '#f85149',
            ghost: '#8b949e',
            pale: '#c9d1d9',
            bright: '#ecf2f8',
          },
          fontSize: {
            '2xs': ['10px', '14px'],
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/static/dashboard.js"></script>
</body>
</html>
