name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Ensure packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync zip

      - name: Install mcp-server deps
        run: |
          cd mcp-server
          npm ci

      - name: Typecheck + build mcp-server
        run: |
          cd mcp-server
          npm run typecheck
          npm run build

      - name: Package release assets
        run: |
          scripts/package-release.sh --out dist/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/rex-cli.tar.gz
            dist/release/rex-cli.zip
            dist/release/aios-install.sh
            dist/release/aios-install.ps1
