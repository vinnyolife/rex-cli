name: ci-main

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scripts-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run repo scripts tests
        run: npm run test:scripts

  mcp-server-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install mcp-server deps
        working-directory: mcp-server
        run: npm ci

      - name: Typecheck + test + build mcp-server
        working-directory: mcp-server
        run: |
          npm run typecheck
          npm run test
          npm run build
