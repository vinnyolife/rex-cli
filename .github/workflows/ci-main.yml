name: ci-main

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scripts-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run repo scripts tests
        run: npm run test:scripts

  mcp-server-quality:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install mcp-server deps
        working-directory: mcp-server
        run: npm ci

      - name: Typecheck + test + build mcp-server
        working-directory: mcp-server
        run: |
          npm run typecheck
          npm run test
          npm run build

  performance-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install mcp-server deps
        working-directory: mcp-server
        run: npm ci

      - name: Run orchestrate/learn-eval perf smoke
        run: npm run perf:orchestrate-learn-eval:smoke -- --json-out test-results/perf-orchestrate-learn-eval-smoke.json

      - name: Run team status watch perf smoke
        run: npm run perf:team-status-watch:smoke -- --json-out test-results/perf-team-status-watch-smoke.json

      - name: Upload perf smoke artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-smoke
          path: test-results/perf-*.json
          if-no-files-found: ignore
