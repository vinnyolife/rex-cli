name: docs-pages

on:
  push:
    branches: ["main"]
    paths:
      - "mkdocs.yml"
      - "mkdocs.blog.yml"
      - "docs-site/**"
      - "blog-site/**"
      - "docs-requirements.txt"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs-requirements.txt

      - name: Build docs site
        run: mkdocs build --strict -f mkdocs.yml

      - name: Build blog site
        run: mkdocs build --strict -f mkdocs.blog.yml

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Guard stale reruns
        id: freshness
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: "main",
            });
            const latestSha = data.commit.sha;
            const isLatest = context.sha === latestSha;
            core.setOutput("latest_sha", latestSha);
            core.setOutput("is_latest", isLatest ? "true" : "false");
            if (!isLatest) {
              core.warning(
                `Skip deploy for stale run commit ${context.sha}; latest main is ${latestSha}.`,
              );
            }

      - name: Deploy to GitHub Pages
        if: steps.freshness.outputs.is_latest == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Skip stale deploy
        if: steps.freshness.outputs.is_latest != 'true'
        run: |
          echo "stale run detected: ${GITHUB_SHA}"
          echo "latest main: ${{ steps.freshness.outputs.latest_sha }}"
          echo "deployment intentionally skipped"
