site_name: RexCLI Documentation
site_url: https://cli.rexai.top
site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, Gemini CLI, and OpenCode skills sync.
site_author: RexAI
repo_url: https://github.com/rexleimo/rex-cli
repo_name: rexleimo/rex-cli

docs_dir: docs-site
site_dir: site

theme:
  name: material
  custom_dir: docs-site/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - zh
        - ja
        - ko
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_name: RexCLI Documentation
          site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, Gemini CLI, and OpenCode skills sync.
        - locale: zh
          name: 简体中文
          build: true
          site_name: RexCLI 文档
          site_description: 面向 Codex CLI、Claude Code、Gemini CLI 及 OpenCode skills 同步的本地优先多 CLI 智能体工作流文档。
          nav_translations:
            Home: 首页
            Blog: 博客
            Getting Started: 快速开始
            Quick Start: 快速开始
            Windows Guide: Windows 安装指南
            Troubleshooting: 故障排查
            Core Features: 功能核心
            ContextDB: ContextDB
            Superpowers: Superpowers
            Architecture: 架构
            CLI Workflows: CLI 工作流
            Resources: 资源
            CLI Comparison: CLI 对比
            Case Library: 官方案例库
            Case - Cross-CLI Handoff: 案例 - 跨 CLI 交接
            Case - Browser Auth-Wall Flow: 案例 - 浏览器认证墙流程
            Case - Privacy Guard Config Read: 案例 - Privacy Guard 配置读取
            Changelog: 更新日志
            Friends: 友情链接
            External: 外部链接
            Project: 项目地址
        - locale: ja
          name: 日本語
          build: true
          site_name: RexCLI ドキュメント
          site_description: Codex CLI、Claude Code、Gemini CLI と OpenCode skills 同期向けのローカルファーストなマルチ CLI エージェント運用ドキュメント。
          nav_translations:
            Home: ホーム
            Blog: ブログ
            Getting Started: クイックスタート
            Quick Start: クイックスタート
            Windows Guide: Windows ガイド
            Troubleshooting: トラブルシューティング
            Core Features: コアプリ 功能
            ContextDB: ContextDB
            Superpowers: Superpowers
            Architecture: アーキテクチャ
            CLI Workflows: CLI ワークフロー
            Resources: リソース
            CLI Comparison: CLI 比較
            Case Library: 公式ケースライブラリ
            Case - Cross-CLI Handoff: 事例 - クロスCLI引き継ぎ
            Case - Browser Auth-Wall Flow: 事例 - ブラウザ認証ウォール
            Case - Privacy Guard Config Read: 事例 - Privacy Guard設定読取
            Changelog: 変更履歴
            Friends: リンク集
            External: 外部リンク
