site_name: rex-ai-boot Documentation
site_url: https://cli.rexai.top
site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, and Gemini CLI.
site_author: RexAI
repo_url: https://github.com/rexleimo/rex-ai-boot
repo_name: rexleimo/rex-ai-boot

docs_dir: docs-site
site_dir: site

theme:
  name: material
  custom_dir: docs-site/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - zh
        - ja
        - ko
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_name: rex-ai-boot Documentation
          site_description: Local-first multi-CLI agent workflow docs for Codex CLI, Claude Code, and Gemini CLI.
        - locale: zh
          name: 简体中文
          build: true
          site_name: rex-ai-boot 文档
          site_description: 面向 Codex CLI、Claude Code、Gemini CLI 的本地优先多 CLI 智能体工作流文档。
          nav_translations:
            Overview: 概览
            Quick Start: 快速开始
            CLI Workflows: CLI 工作流
            Architecture: 架构
            ContextDB: ContextDB
            Troubleshooting: 故障排查
        - locale: ja
          name: 日本語
          build: true
          site_name: rex-ai-boot ドキュメント
          site_description: Codex CLI、Claude Code、Gemini CLI 向けのローカルファーストなマルチ CLI エージェント運用ドキュメント。
          nav_translations:
            Overview: 概要
            Quick Start: クイックスタート
            CLI Workflows: CLI ワークフロー
            Architecture: アーキテクチャ
            ContextDB: ContextDB
            Troubleshooting: トラブルシューティング
        - locale: ko
          name: 한국어
          build: true
          site_name: rex-ai-boot 문서
          site_description: Codex CLI, Claude Code, Gemini CLI를 위한 로컬 우선 멀티 CLI 에이전트 워크플로 문서.
          nav_translations:
            Overview: 개요
            Quick Start: 빠른 시작
            CLI Workflows: CLI 워크플로
            Architecture: 아키텍처
            ContextDB: ContextDB
            Troubleshooting: 문제 해결

extra:
  links:
    product: https://cli.rexai.top
    blog: https://rexai.top
    tools: https://tool.rexai.top

extra_javascript:
  - assets/analytics-placeholder.js

extra_css:
  - assets/custom.css

nav:
  - Overview: index.md
  - Quick Start: getting-started.md
  - CLI Workflows: use-cases.md
  - Architecture: architecture.md
  - ContextDB: contextdb.md
  - Troubleshooting: troubleshooting.md
