site_name: RexCLI Blog
site_url: https://cli.rexai.top/blog/
site_description: Engineering and growth blog for AI memory systems, Hermes workflows, Agent Team runtime, and automatic subagent planning.
site_author: RexAI
repo_url: https://github.com/rexleimo/rex-cli
repo_name: rexleimo/rex-cli

docs_dir: blog-site
site_dir: site/blog

theme:
  name: material
  custom_dir: docs-site/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang:
        - en
        - zh
        - ja
        - ko
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
          site_name: RexCLI Blog
          site_description: Engineering and growth blog for AI memory systems, Hermes workflows, Agent Team runtime, and automatic subagent planning.
        - locale: zh
          name: 简体中文
          build: true
          site_name: RexCLI 博客
          site_description: 面向 AI 记忆系统、Hermes 工作流、Agent Team 与自动化子代理规划的工程与增长博客。
          nav_translations:
            Docs Home: 文档首页
            Blog Home: 博客首页
            Posts: 文章列表
        - locale: ja
          name: 日本語
          build: true
          site_name: RexCLI ブログ
          site_description: AI 記憶システム、Hermes ワークフロー、Agent Team、subagent 自動計画向けの成長・技術ブログ。
          nav_translations:
            Docs Home: ドキュメントホーム
            Blog Home: ブログホーム
            Posts: 記事一覧
        - locale: ko
          name: 한국어
          build: true
          site_name: RexCLI 블로그
          site_description: AI 기억 시스템, Hermes 워크플로, Agent Team, 자동 subagent 계획 중심의 성장/엔지니어링 블로그.
          nav_translations:
            Docs Home: 문서 홈
            Blog Home: 블로그 홈
            Posts: 글 목록

extra:
  links:
    docs: https://cli.rexai.top/
    product: https://cli.rexai.top/
    blog_main: https://rexai.top/
    tools: https://tool.rexai.top/

extra_javascript:
  - assets/analytics-placeholder.js

extra_css:
  - assets/custom.css

nav:
  - Docs Home: https://cli.rexai.top/
  - Blog Home: index.md
  - Posts:
      - Browser MCP Weak-Model Upgrade: 2026-04-browser-mcp-weak-model-upgrade.md
      - Advanced Design Skills Playbook: advanced-design-skills-page-building.md
      - Launch Post: launch-post.md
      - CLI Comparison: cli-comparison-post.md
      - Automation Playbook: automation-playbook-post.md
      - AIOS RL Training System: rl-training-system.md
      - ContextDB Search Upgrade: contextdb-fts-bm25-search.md
      - Windows CLI Startup Stability: windows-cli-startup-stability.md
      - Orchestrate Live: orchestrate-live.md
      - 小红书自动化: xiaohongshu-automation.md
      - AI CLI 横评: ai-cli-comparison.md
